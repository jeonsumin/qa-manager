services:
  backend:
    build:
      context: ./backend
    ports:
      - "9000:3001"
    volumes:
      - ./backend/src:/app/src
      - db_data:/app/data
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/qa-manager.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_TARGET=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
